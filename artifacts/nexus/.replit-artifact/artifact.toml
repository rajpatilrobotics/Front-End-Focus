kind = "web"
previewPath = "/"
title = "ContextFirst Nexus"
version = "1.0.0"
id = "artifacts/nexus"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18245

[services.development]
run = "pnpm --filter @workspace/nexus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus", "run", "build" ]
serve = "static"
publicDir = "artifacts/nexus/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18245"
BASE_PATH = "/"
